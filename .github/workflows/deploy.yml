name: CD - Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag de imagen (default: short SHA)"
        required: false
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}

jobs:
  test-backend:
    name: Test Backend
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  test-frontend:
    name: Test Frontend
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: meta
        run: |
          TAG="${{ inputs.image_tag || github.sha }}"
          SHORT_SHA=$(echo "$TAG" | cut -c1-7)
          echo "version=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Tag: $SHORT_SHA"

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/app-backend:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_BASE }}/app-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/app-frontend:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_BASE }}/app-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,infra/monitoring/*.yml,infra/monitoring/grafana/**"
          target: "/opt/app/"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          timeout: 180s
          script: |
            set -euo pipefail

            APP_DIR="/opt/app"
            cd "$APP_DIR"

            echo "=== Deploy iniciado: $(date) ==="
            echo "Tag: ${{ needs.build-and-push.outputs.image_tag }}"

            # Crear .env si no existe (valores por defecto)
            if [ ! -f .env ]; then
              {
                echo "POSTGRES_DB=${POSTGRES_DB:-app_db}"
                echo "POSTGRES_USER=${POSTGRES_USER:-app_user}"
                echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-app_pass}"
                echo "DOCKER_REGISTRY=${{ env.IMAGE_BASE }}"
                echo "IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}"
                echo "CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}"
                echo "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api}"
                echo "GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}"
                echo "GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}"
              } > .env
              echo "  ✓ .env creado con valores por defecto"
            fi

            # Actualizar tag de imagen
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}|" .env

            # Autenticar en GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io \
              -u ${{ github.actor }} \
              --password-stdin

            # Deploy
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker image prune -f || true
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # Health check
            echo "Esperando servicios..."
            sleep 20

            echo "=== Estado de servicios ==="
            docker compose -f docker-compose.prod.yml ps

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check OK (HTTP $HTTP_CODE)"
            else
              echo "❌ Health check falló (HTTP $HTTP_CODE)"
              docker compose -f docker-compose.prod.yml logs --tail=50
              exit 1
            fi

            echo "=== Deploy completado: $(date) ==="

      - name: Notify result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deploy exitoso - Tag: ${{ needs.build-and-push.outputs.image_tag }}"
          else
            echo "❌ Deploy fallido"
            exit 1
          fi
