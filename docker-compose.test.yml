name: client-management-test

# ─── Tests — PostgreSQL temporal + ejecución de tests ──
# Uso: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
# Las variables se pueden overridear via .env o shell
# ─────────────────────────────────────────────────────

services:

  app-postgres-test:
    image: postgres:16-alpine
    container_name: app-postgres-test
    restart: "no"
    environment:
      POSTGRES_DB: ${TEST_POSTGRES_DB:-app_db_test}
      POSTGRES_USER: ${TEST_POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-app_pass}
    ports:
      - "${TEST_POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_POSTGRES_USER:-app_user} -d ${TEST_POSTGRES_DB:-app_db_test}"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s
    networks:
      - test-network

  app-backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    container_name: app-backend-test
    restart: "no"
    depends_on:
      app-postgres-test:
        condition: service_healthy
    env_file:
      - ./backend/.env.test
    environment:
      DATABASE_URL: postgresql://${TEST_POSTGRES_USER:-app_user}:${TEST_POSTGRES_PASSWORD:-app_pass}@app-postgres-test:5432/${TEST_POSTGRES_DB:-app_db_test}
      NODE_ENV: test
      PORT: 0
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
